general {
    immediate_render = true
}

background {
    monitor =
        path = /home/matheusdev/wallpapers/117497448_p0.jpg  # <--- O CAMINHO DA SUA FOTO AQUI
        color = rgba(25, 20, 20, 1.0)
        blur_passes = 1 # 0 para foto nítida, 1 ou mais para efeito desfocado
        blur_size = 7
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    outer_color = rgba(80, 73, 69, 1.0)
    inner_color = rgba(50, 48, 47, 1.0)
    font_color = rgba(235, 219, 178, 1.0)

    # POSIÇÃO DA SENHA (Desci um pouco mais para não bater na foto)
    position = 0, -140

    fade_on_empty = false
    placeholder_text = <b>Input Password...</b>
    halign = center
    valign = center
}

label {
  text = cmd[update:1000] echo "$(date +"%A, %B %d")"

  color = rgba(152, 152, 26, 1.0)
  font_size = 20
  font_family = SF Pro Display Bold
  position = 0, 405

  halign = center
  valign = center
}

label {
  text = cmd[update:1000] echo "$(date +"%k:%M")"

  color = rgba(235, 219, 178, 1.0)
  font_size = 93
  font_family = SF Pro Display Bold
  position = 0, 310

  halign = center
  valign = center
}

