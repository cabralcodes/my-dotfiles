################
### MONITORS ###
################

monitor = HDMI-A-1, 1920x1080@144, auto, 1

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = Thunar
$menu = rofi -show drun

#################
### AUTOSTART ###
#################

exec-once = systemctl --user start hyprpolkitagent
exec-once = waybar
exec-once = awww-daemon &
#exe-once = mpvpaper
#exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
#exec-once = awww img /home/matheusdev/wallpapers/117497448_p0.jpg
#exec-once = gnome-keyring-daemon --start --components=secrets

exec-once = hypridle
#exec-once = gnome-keyring-daemon --start --components=secrets
#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME, WhiteSur-cursors
###################
### PERMISSIONS ###
###################

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 6

    border_size = 2

    col.active_border = rgba(458588ff)
    col.inactive_border = rgba(a89984ff)

    resize_on_border = false

    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 12
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 8
        passes = 3

        vibrancy = 0.1696
    }
}

animations {
    enabled = yes,

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

dwindle {
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}


#############
### INPUT ###
#############

input {
    kb_layout = br
    kb_variant = abnt2
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = -0.7

    touchpad {
        natural_scroll = true
    }
}



#device {
 #   name = epic-mouse-v1
  #  sensitivity = -0.5
#}

###################
### KEYBINDINGS ###
###################
env = HYPRSHOT_DIR,$HOME/Prints
$mainMod = SUPER

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, F, fullscreen
bind = $mainMod, L, exec, hyprlock
# Mover janela focada para o workspace N (Windows + Shift + Número)
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10
bind = $mainMod,X, exec, wlogout
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, S, exec, spotify
bind = $mainMod, C, exec, code
bind = $mainMod SHIFT, C, exec, helium --app=https://calendar.notion.so
bind = $mainMod, END, exec, killall waybar || waybar
bind = $mainMod SHIFT, V, exec, kitty --title cava cava
bind = $mainMod SHIFT, T, exec, kitty -e btop
bind = $mainMod SHIFT, M, exec, kitty -e cmatrix
bind = , Print, exec, hyprshot -m output
bind = , F9, exec, hyprshot -m region
# Exemplo para gravar a tela inteira direto na pasta escolhida:
bind = $mainMod SHIFT, R, exec, killall wf-recorder || wf-recorder -f ~/Videos/video_$(date +%Y%m%d_%H%M%S).mp4
# Aumentar a transparência da janela focada (Mod + Alt + Seta para Baixo)
bind = $mainMod ALT, down, exec, hyprctl dispatch setprop active opacity 0.85

# Voltar a janela focada para 100% opaca (Mod + Alt + Seta para Cima)
bind = $mainMod ALT, up, exec, hyprctl dispatch setprop active opacity 1.0
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10



bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# O Hyprland novo usa 'suppressmaximize' em vez de 'suppressevent maximize'
#windowrulev2 = suppressmaximize, class:.*
windowrule {
	name = transparencia-geral
	match:class = .*
	opacity = 0.85 0.75
	
}
windowrule {
    name = re2-fix
    match:class = ^(steam_proton)$
    opacity = 1.0 1.0
}

windowrule {
    name = vscode
    match:class = ^(code)$
    opacity = 1.0 1.0
}

workspace = 1, monitor:HDMI-A-1, default:true, persistent:true


